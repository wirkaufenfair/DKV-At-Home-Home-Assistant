name: Release

on:
  release:
    types: [published]

jobs:
  build:
    name: Build and upload release asset
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build dkv_at_home.zip
        run: |
          cd custom_components
          zip -r ../dkv_at_home.zip dkv_at_home/

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dkv_at_home.zip
