name: Bug report
description: Melde einen Fehler in der DKV@Home Integration
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Danke fürs Melden! Bitte keine Tokens oder Zugangsdaten posten.

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant Version
      placeholder: "z. B. 2026.4.0"
    validations:
      required: true

  - type: input
    id: integration_version
    attributes:
      label: Integrationsversion
      placeholder: "z. B. 1.0.2"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Fehlerbeschreibung
      description: Was passiert und was wäre das erwartete Verhalten?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Schritte zum Reproduzieren
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevante Logs
      description: Bitte sensible Daten entfernen.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Zusätzliche Informationen
      description: Optional
